<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin page</title>
    <script>
        if (sessionStorage.getItem("maynd_admin_auth") !== "true") {
            window.location.href = "/login";
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="icons/favicon.png">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Maynd">
    
</head>
<body>
    <div class="admin-layout">
        <div class=" header" id="header-layout">
            <header>
                <div class="logo">Maynd<span class="logo">Stomir</span></div>
                <nav>
                    <a href="/admin" class="active">All Jobs</a>
                    <a href="/technicians">Technicians</a>
                </nav>
                <button onclick="sessionStorage.removeItem('maynd_admin_auth'); window.location.href='/login'" class="primary">
                    Logout
                </button>
                <button class="hamburger" id="hamburger" aria-label="Open menu">
                    <i class="ti ti-menu-2"></i>
                </button>
            </header>
            <!-- Drawer -->
            <div class="drawer-overlay" id="drawer-overlay"></div>
            <div class="drawer" id="drawer">
                <div class="drawer-header">
                    <button class="drawer-close" id="drawer-close" aria-label="Close menu">
                        <i class="ti ti-x"></i>
                    </button>
                </div>
                <nav class="drawer-nav">
                    <a href="/admin"><i class="ti ti-plus"></i> All Jobs</a>
                    <a href="/technicians"><i class="ti ti-tool"></i> Technicians</a>
                </nav>
            </div>
        </div>
        <div class="admin-content">
            <div class="admin-header">
                <h2>Dispatch Overview</h2>
                <div class="admin-left">
                    <input type="search" placeholder="Search by name,category, zone e.t.c" name="search_field">
                    <select name="filter" id="filter">
                        <option value="">All Jobs</option>
                        <option value="pending">Pending</option>
                        <option value="assigned">Assigned</option>
                        <option value="completed">Completed</option>
                    </select>
                    <select id="sort" class="filter-select">
                        <option value="">Sort By (Default)</option>
                        <option value="id-desc">Job ID: Highest First</option>
                        <option value="id-asc">Job ID: Lowest First</option>
                        <option value="name-asc">Customer Name: A to Z</option>
                        <option value="name-desc">Customer Name: Z to A</option>
                        <option value="date-desc">Availability: Newest First</option>
                        <option value="date-asc">Availability: Oldest First</option>
                    </select>
                </div>
            </div>
            <div class="dispatch-cards">
                <div class="dispatch-card pending">
                    <div class="card-num"></div>
                    <div class="card-info">Pending Jobs</div>
                </div>
                <div class="dispatch-card assigned">
                    <div class="card-num"></div>
                    <div class="card-info">Assigned</div>
                </div>
                <div class="dispatch-card completed">
                    <div class="card-num"></div>
                    <div class="card-info">Completed</div>
                </div>
            </div>
            <div class="dispatch-visual">
                <div class="table-wrapper">
                    <table class="dispatch-table">
                        <thead>
                            <tr>
                                <th>job id</th>
                                <th>customer</th>
                                <th>category</th>
                                <th>location</th>
                                <th>scheduled</th>
                                <th>status</th>
                                <th>Assigned To</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="skeleton-row">
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
         <nav class="bottom-nav">
            <a href="/admin" class="active">
                <i class="ti ti-plus"></i>
                <span>All Jobs</span>
            </a>
            <a href="#">
                <i class="ti ti-search"></i>
                <span>Track</span>
            </a>
        </nav>
    </div>

    <script>
        const currentPage = window.location.pathname.split("/").pop();

        document.querySelectorAll("nav a").forEach(link => {
            const linkPage = link.getAttribute("href").split("/").pop();
            if (linkPage === currentPage) {
                link.classList.add("active");
            }
        });


        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(() => console.log('Service Worker registered'))
                .catch((err) => console.error('Service Worker failed:', err));
        }
    </script>
    <script src="js/admin.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
