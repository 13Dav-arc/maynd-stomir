<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maynd Stomir — Technicians</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-layout">
        <div class=" header" id="header-layout">
            <header>
                <div class="logo">Maynd<span class="logo">Stomir</span></div>
                <nav>
                    <a href="/admin">All Jobs</a>
                    <a href="/technicians" class="active">Technicians</a>
                </nav>
                <button onclick="sessionStorage.removeItem('maynd_admin_auth'); window.location.href='login.html'" class="primary">
                    Logout
                </button>
                <button class="hamburger" id="hamburger" aria-label="Open menu">
                    <i class="ti ti-menu-2"></i>
                </button>
            </header>
            <!-- Drawer -->
            <div class="drawer-overlay" id="drawer-overlay"></div>
            <div class="drawer" id="drawer">
                <div class="drawer-header">
                    <button class="drawer-close" id="drawer-close" aria-label="Close menu">
                        <i class="ti ti-x"></i>
                    </button>
                </div>
                <nav class="drawer-nav">
                    <a href="/admin"><i class="ti ti-plus"></i>All Jobs</a>
                    <a href="/technicians"><i class="ti ti-tool"></i>Technicians</a>
                </nav>
            </div>
        </div>
        

        <div class="admin-content">

            <!-- STAT CARDS -->
            <div class="dispatch-cards">
                <div class="dispatch-card">
                    <div class="card-num" id="total-technicians">—</div>
                    <div class="card-info">Total Technicians</div>
                </div>
                <div class="dispatch-card assigned">
                    <div class="card-num" id="assigned-technicians">—</div>
                    <div class="card-info">Currently Assigned</div>
                </div>
                <div class="dispatch-card completed">
                    <div class="card-num" id="total-jobs-done">—</div>
                    <div class="card-info">Total Jobs Done</div>
                </div>
            </div>

            <!-- CONTROLS -->
            <div class="admin-header">
                <h2>Technician Directory</h2>
                <div class="admin-left">
                    <input type="search" placeholder="Search by name, phone, trade..." id="tech-search">
                    <select id="status-filter">
                        <option value="">All Status</option>
                        <option value="assigned">Assigned</option>
                        <option value="available">Available</option>
                        <option value="rejected">Rejected</option>
                        <option value="pending_approval">Awaiting Approval </option>
                    </select>
                    <select id="trade-filter">
                        <option value="">All Trades</option>
                        <option value="hvac">HVAC</option>
                        <option value="plumbing">Plumbing</option>
                        <option value="electrical">Electrical</option>
                        <option value="painting">Painting</option>
                        <option value="carpentry">Carpentry</option>
                        <option value="flooring">Flooring</option>
                        <option value="appliance_repair">Appliance Repair</option>
                        <option value="pest_control">Pest Control</option>
                        <option value="cleaning">Deep Cleaning</option>
                        <option value="masonry">Masonry / Tiling</option>
                        <option value="glass_windows">Glass & Windows</option>
                        <option value="locks_security">Locks & Security</option>
                        <option value="other">Other</option>
                    </select>
                    <select id="sort-filter" class="filter-select">
                        <option value="">Sort By (Default)</option>
                        <option value="name-asc">Name: A to Z</option>
                        <option value="name-desc">Name: Z to A</option>
                        <option value="date-desc">Newest Joined</option>
                        <option value="date-asc">Oldest Joined</option>
                        <option value="jobs-desc">Most Jobs Completed</option>
                    </select>
                </div>
            </div>

            <!-- TABLE -->
            <div class="dispatch-visual">
                <div class="table-wrapper">
                    <table class="dispatch-table" id="tech-table">
                        <thead>
                            <tr>
                                <th>Technician</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>Trade</th>
                                <th>Status</th>
                                <th>Jobs Done</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tech-tbody">
                            <!-- populated by technicians.js -->
                            <tr class="skeleton-row">
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                                <td><div class="skeleton-line"></div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
    <script>
        const currentPage = window.location.pathname.split("/").pop();

        document.querySelectorAll("nav a").forEach(link => {
            const linkPage = link.getAttribute("href").split("/").pop();
            if (linkPage === currentPage) {
                link.classList.add("active");
            }
        });
    </script>
    <script src="js/technicians.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
