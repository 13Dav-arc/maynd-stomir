<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maynd Stomir — Admin Login</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#c9a84c">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --charcoal:     #1E293B;   
            --charcoal-mid: #0F172A;   
            --gold:         #c9a84c;
            --gold-light:   #e2c06a;
            --cream:        #f5f0e8;
            --white:        #ffffff;
            --off-white:    #faf8f4;
            --border:       #e8e0d0;
            --text:         #1a1a1a;
            --muted:        #7a7a7a;
            --error:        #c0392b;
        }

        body {
            background: var(--charcoal);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* BRAND */
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
        }
        .brand-logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--white);
            letter-spacing: 0.05em;
        }
        .brand-logo span {
            color: var(--gold);
        }
        .brand-divider {
            width: 40px;
            height: 3px;
            background: var(--gold);
            border-radius: 2px;
        }
        .brand-sub {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        /* CARD */
        .login-card {
            background: var(--off-white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }
        .card-header {
            background: var(--charcoal-mid);
            padding: 1.2rem 1.8rem;
            border-bottom: 2px solid var(--gold);
        }
        .card-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .card-header p {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.2rem;
        }
        .card-body {
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* FORM */
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .field label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--charcoal-mid);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .field input {
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: 4px;
            height: 42px;
            padding: 0 0.9rem;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            transition: border-color 0.2s ease;
            outline: none;
        }
        .field input:hover {
            border-color: var(--gold);
        }
        .field input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
        }

        /* ERROR */
        .error-msg {
            display: none;
            background: rgba(192, 57, 43, 0.08);
            border: 1px solid rgba(192, 57, 43, 0.3);
            border-radius: 4px;
            padding: 0.7rem 0.9rem;
            font-size: 0.8rem;
            color: var(--error);
        }
        .error-msg.show {
            display: block;
        }

        /* BUTTON */
        .login-btn {
            width: 100%;
            height: 44px;
            background: var(--gold);
            color: var(--charcoal);
            border: none;
            border-radius: 4px;
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
        }
        .login-btn:hover {
            background: var(--gold-light);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(201, 168, 76, 0.4);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .login-btn:disabled {
            background: var(--border);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* FOOTER */
        .login-footer {
            text-align: center;
            font-size: 0.7rem;
            color: var(--muted);
        }
        .password-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrap input {
            width: 100%;
            padding-right: 2.5rem;
        }
        .toggle-pwd-btn {
            position: absolute;
            right: 0.8rem;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--charcoal-mid);
            padding: 0;
            display: flex;
            align-items: center;
            font-size: 1rem;
            transition: color 0.2s ease;
        }
        .toggle-pwd-btn:hover {
            color: var(--charcoal);
        }
    </style>
</head>
<body>

    <div class="login-wrap">

        <div class="brand">
            <div class="brand-logo">Maynd<span>Stomir</span></div>
            <div class="brand-divider"></div>
            <div class="brand-sub">Dispatch Command Centre</div>
        </div>

        <div class="login-card">
            <div class="card-header">
                <h2>Admin Access</h2>
                <p>Restricted to authorised personnel only</p>
            </div>
            <div class="card-body">
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" autocomplete="username">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <div class="password-wrap">
                        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
                        <button type="button" id="toggle-password" class="toggle-pwd-btn">
                            <i class="ti ti-eye" id="toggle-icon"></i>
                        </button>
                    </div>
                </div>
                <div class="error-msg" id="error-msg">
                    Incorrect username or password. Please try again.
                </div>
                <button class="login-btn" id="login-btn">Access Dashboard →</button>
            </div>
        </div>

        <div class="login-footer">
            Maynd Stomir &copy; 2026 &nbsp;|&nbsp; Internal use only
        </div>

    </div>

    <script>
        // ── CREDENTIALS (change these to whatever Yemi decides) ──
        const ADMIN_USERNAME = "maynd_admin";
        const ADMIN_PASSWORD = "Stomir@2026";

        // If already logged in, go straight to dashboard
        if (sessionStorage.getItem("maynd_admin_auth") === "true") {
            window.location.href = "admin.html";
        }

        const loginBtn = document.getElementById("login-btn");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const errorMsg = document.getElementById("error-msg");

        const toggleBtn  = document.getElementById("toggle-password");
        const toggleIcon = document.getElementById("toggle-icon");

        toggleBtn.addEventListener("click", () => {
            const isPassword = passwordInput.type === "password";
            passwordInput.type = isPassword ? "text" : "password";
            toggleIcon.className = isPassword ? "ti ti-eye-off" : "ti ti-eye";
        });
        loginBtn.addEventListener("click", () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                errorMsg.textContent = "Please enter both username and password.";
                errorMsg.classList.add("show");
                return;
            }

            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                sessionStorage.setItem("maynd_admin_auth", "true");
                window.location.href = "admin.html";
            } else {
                errorMsg.textContent = "Incorrect username or password. Please try again.";
                errorMsg.classList.add("show");
                passwordInput.value = "";
                passwordInput.focus();
            }
        });

        // Allow Enter key to submit
        passwordInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") loginBtn.click();
        });
        usernameInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") passwordInput.focus();
        });

        // Hide error on input
        [usernameInput, passwordInput].forEach(input => {
            input.addEventListener("input", () => {
                errorMsg.classList.remove("show");
            });
        });
    </script>

</body>
</html>
